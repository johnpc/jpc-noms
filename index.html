<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>jpc.noms — pick where to eat, together</title>

    <base href="/" />

    <meta name="color-scheme" content="light dark" />
    <meta
      name="viewport"
      content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />

    <link rel="manifest" href="/manifest.json" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- add to homescreen for ios -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="jpc.noms" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#FF6B5C" />

    <!-- Apply the saved theme BEFORE first paint so a dark user never sees a
         white flash (FOUC). Mirrors features/settings/useTheme; that hook is
         still the source of truth once React mounts. -->
    <script>
      (function () {
        try {
          var c = localStorage.getItem('noms.theme') || 'system';
          var dark =
            c === 'dark' ||
            (c === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('ion-palette-dark', dark);
        } catch (e) {
          /* no storage (private mode) — fall back to light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
